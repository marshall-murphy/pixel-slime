<!DOCTYPE html>
<html lang="en">
<head>
 <meta charset="UTF-8">
 <title>Pixel Slime</title>
 <style>
 body {
 font-family: Arial, sans-serif;
 text-align: center;
 background: #0f0f0f;
 color: #e0e0e0;
 margin: 0;
 padding: 20px;
 }
 canvas {
 border: 3px solid #222;
 background: #000;
 box-shadow: 0 0 30px rgba(0,0,0,0.6);
 max-width: 100%;
 border-radius: 6px;
 }
 .controls {
 margin: 30px auto;
 max-width: 960px;
 display: flex;
 flex-wrap: wrap;
 gap: 14px 20px;
 justify-content: center;
 align-items: center;
 }
 label, select, button, input[type="color"], input[type="number"] {
 font-size: 15px;
 padding: 9px 12px;
 border-radius: 6px;
 background: #222;
 color: #eee;
 border: 1px solid #444;
 }
 input[type="range"] {
 width: 240px;
 }
 button {
 cursor: pointer;
 transition: all 0.18s;
 }
 button:hover:not(:disabled) {
 background: #333;
 }
 button:disabled {
 opacity: 0.35;
 cursor: not-allowed;
 }
 #playBtn.active {
 background: #1b5e20;
 border-color: #388e3c;
 color: white;
 }
 #recordBtn.recording {
 background: #b71c1c;
 border-color: #d32f2f;
 animation: pulse 1.4s infinite;
 }
 @keyframes pulse {
 0%,100% { transform: scale(1); }
 50% { transform: scale(1.06); }
 }
 .color-swatches {
 display: flex;
 flex-wrap: wrap;
 gap: 10px;
 justify-content: center;
 margin: 8px 0;
 }
 .swatch {
 width: 34px;
 height: 34px;
 border-radius: 50%;
 border: 2px solid #444;
 cursor: pointer;
 transition: transform 0.15s, border 0.15s;
 }
 .swatch:hover {
 transform: scale(1.2);
 border-color: #888;
 }
 .color-pickers {
 display: flex;
 gap: 16px;
 justify-content: center;
 flex-wrap: wrap;
 margin: 10px 0;
 }
 h1 {
 margin: 10px 0 8px;
 font-size: 2.1rem;
 }
 </style>
</head>
<body>
 <h1>🦠PIXEL SLIME🦠</h1>

 <canvas id="canvas" width="1920" height="1080"></canvas>

 <div class="controls">

 <label>Width: <input id="w" type="number" value="1920" step="10"></label>
 <label>Height: <input id="h" type="number" value="1080" step="10"></label>
 <button id="resize">Apply Resolution</button>

 <label>Mode:
 <select id="colorMode">
 <option value="mono">Monochrome</option>
 <option value="color">Color</option>
 </select>
 </label>

 <div id="colorControls" style="display:none; flex-wrap: wrap; gap: 16px; justify-content: center;">
 <div class="color-pickers">
 <label>Background: <input type="color" id="bgColor" value="#000000"></label>
 <label>Growth: <input type="color" id="growthColor" value="#ffffff"></label>
 </div>

 <div class="color-swatches">
 <div class="swatch" style="background:#ff1744" onclick="setColors('#000000','#ff1744')"></div>
 <div class="swatch" style="background:#00e676" onclick="setColors('#000000','#00e676')"></div>
 <div class="swatch" style="background:#2979ff" onclick="setColors('#000000','#2979ff')"></div>
 <div class="swatch" style="background:#ffea00" onclick="setColors('#000000','#ffea00')"></div>
 <div class="swatch" style="background:#d500f9" onclick="setColors('#000000','#d500f9')"></div>
 <div class="swatch" style="background:#00e5ff" onclick="setColors('#000000','#00e5ff')"></div>

 <div class="swatch" style="background:#000000" onclick="setColors('#ff1744','#000000')"></div>
 <div class="swatch" style="background:#000000" onclick="setColors('#00e676','#000000')"></div>
 </div>
 </div>

 <label>Clusters: <input id="seeds" type="number" min="1" max="200" value="8"></label>
 <label>Cluster Size (px): <input id="clusterSize" type="range" min="1" max="20" value="12"><span id="clusterSizeVal">12</span></label>
 <label>Agents: <input id="agentsSlider" type="range" min="1000" max="20000" step="500" value="6000"><span id="agentsVal">6000</span></label>
 <label>Thickness: <input id="thicknessSlider" type="range" min="1" max="8" value="4"><span id="thicknessVal">4</span></label>
 <label>Sensor dist: <input id="sensorDist" type="range" min="5" max="35" value="10"><span id="sensorDistVal">10</span></label>
 <label>Turn strength: <input id="turnStrength" type="range" min="0.1" max="0.8" step="0.05" value="0.25"><span id="turnStrengthVal">0.25</span></label>
 <label>Speed: <input id="growthSpeed" type="range" min="1" max="15" value="4"><span id="growthSpeedVal">4</span></label>
 <label>Fill boost: <input id="fillBoost" type="range" min="0" max="1" step="0.05" value="0.3"><span id="fillBoostVal">0.3</span></label>

 <div style="display: flex; gap: 14px; flex-wrap: wrap; justify-content: center; width: 100%; margin-top: 10px;">
 <button id="playBtn">▶ Play</button>
 <button id="pauseBtn" disabled>❚❚ Pause</button>
 <button id="resetBtn">Reset / Clear</button>
 <button id="invert">Invert Colors</button>
 <button id="recordBtn">⏺ Record</button>
 </div>

 </div>

 <script>
 const canvas = document.getElementById('canvas');
 const ctx = canvas.getContext('2d');
 let imageData, data, agents = [], simulating = false;

 let bgColor = '#000000';
 let growthColor = '#ffffff';
 let isColorMode = false;

 let numAgents = 6000;
 let depositRadius = 4;
 let sensorDist = 10;
 let turnStrength = 0.25;
 let stepsPerFrame = 4;
 let fillBoost = 0.3;
 let clusterSize = 12;
 const moveSpeed = 2.2;

 const playBtn = document.getElementById('playBtn');
 const pauseBtn = document.getElementById('pauseBtn');
 const resetBtn = document.getElementById('resetBtn');
 const recordBtn = document.getElementById('recordBtn');

 function updatePlayPauseUI() {
 playBtn.classList.toggle('active', simulating);
 pauseBtn.disabled = !simulating;
 }

 function resetCanvas() {
 ctx.fillStyle = bgColor;
 ctx.fillRect(0, 0, canvas.width, canvas.height);
 simulating = false;
 agents = [];
 imageData = null;
 data = null;
 updatePlayPauseUI();
 }

 function setColors(bg, growth) {
 bgColor = bg;
 growthColor = growth;
 document.getElementById('bgColor').value = bg;
 document.getElementById('growthColor').value = growth;
 if (simulating) initSimulation();
 }

 document.getElementById('colorMode').addEventListener('change', e => {
 isColorMode = e.target.value === 'color';
 document.getElementById('colorControls').style.display = isColorMode ? 'flex' : 'none';
 if (isColorMode) {
 bgColor = document.getElementById('bgColor').value;
 growthColor = document.getElementById('growthColor').value;
 } else {
 bgColor = '#000000';
 growthColor = '#ffffff';
 }
 resetCanvas();
 });

 document.getElementById('bgColor').addEventListener('input', e => {
 bgColor = e.target.value;
 if (simulating) initSimulation();
 });
 document.getElementById('growthColor').addEventListener('input', e => {
 growthColor = e.target.value;
 if (simulating) initSimulation();
 });

 function initSimulation() {
 const w = canvas.width, h = canvas.height;

 imageData = ctx.createImageData(w, h);
 data = imageData.data;

 const bgR = parseInt(bgColor.slice(1,3),16);
 const bgG = parseInt(bgColor.slice(3,5),16);
 const bgB = parseInt(bgColor.slice(5,7),16);

 const growR = parseInt(growthColor.slice(1,3),16);
 const growG = parseInt(growthColor.slice(3,5),16);
 const growB = parseInt(growthColor.slice(5,7),16);

 for (let i = 0; i < data.length; i += 4) {
 data[i] = bgR;
 data[i+1] = bgG;
 data[i+2] = bgB;
 data[i+3] = 255;
 }

 agents = [];
 const numClusters = +document.getElementById('seeds').value || 1;

 for (let c = 0; c < numClusters; c++) {
 const sx = Math.random() * w;
 const sy = Math.random() * h;

 const baseRadius = clusterSize / 2;
 const clusterRadius = baseRadius * (0.8 + Math.random() * 0.4);

 for (let dy = -clusterRadius; dy <= clusterRadius; dy++) {
 for (let dx = -clusterRadius; dx <= clusterRadius; dx++) {
 if (dx*dx + dy*dy > clusterRadius*clusterRadius) continue;
 const px = Math.floor(sx + dx);
 const py = Math.floor(sy + dy);
 if (px < 0 || px >= w || py < 0 || py >= h) continue;
 const idx = (py * w + px) * 4;
 data[idx] = growR;
 data[idx+1] = growG;
 data[idx+2] = growB;
 }
 }

 const agentsPerCluster = Math.max(30, Math.floor(numAgents / numClusters));
 for (let a = 0; a < agentsPerCluster; a++) {
 agents.push({
 x: sx + (Math.random() - 0.5) * clusterRadius * 1.5,
 y: sy + (Math.random() - 0.5) * clusterRadius * 1.5,
 angle: Math.random() * Math.PI * 2
 });
 }
 }

 ctx.putImageData(imageData, 0, 0);
 simulating = true;
 updatePlayPauseUI();
 }

 function doGrowth() {
 if (!simulating || !imageData) return;

 const growR = parseInt(growthColor.slice(1,3),16);
 const growG = parseInt(growthColor.slice(3,5),16);
 const growB = parseInt(growthColor.slice(5,7),16);

 for (let step = 0; step < stepsPerFrame; step++) {
 for (let i = 0; i < agents.length; i++) {
 const agent = agents[i];
 const angle = agent.angle;
 const lx = agent.x + Math.cos(angle - Math.PI/4) * sensorDist;
 const ly = agent.y + Math.sin(angle - Math.PI/4) * sensorDist;
 const fx = agent.x + Math.cos(angle) * sensorDist;
 const fy = agent.y + Math.sin(angle) * sensorDist;
 const rx = agent.x + Math.cos(angle + Math.PI/4) * sensorDist;
 const ry = agent.y + Math.sin(angle + Math.PI/4) * sensorDist;

 const left = getTrailStrength(lx, ly);
 const forward = getTrailStrength(fx, fy);
 const right = getTrailStrength(rx, ry);

 let turn = 0;
 if (left > forward && left > right) turn = -turnStrength;
 else if (right > forward && right > left) turn = turnStrength;
 else {
 if (Math.max(left, forward, right) < 100) {
 turn = (Math.random() - 0.5) * turnStrength * (1 + fillBoost * 4);
 } else {
 turn = (Math.random() - 0.5) * turnStrength * 1.2;
 }
 }

 agent.angle += turn;
 agent.x += Math.cos(agent.angle) * moveSpeed;
 agent.y += Math.sin(agent.angle) * moveSpeed;
 agent.x = (agent.x + canvas.width) % canvas.width;
 agent.y = (agent.y + canvas.height) % canvas.height;

 const px = Math.floor(agent.x), py = Math.floor(agent.y);
 const r = depositRadius;
 for (let dy = -r; dy <= r ; dy++) {
 for (let dx = -r; dx <= r; dx++) {
 if (dx*dx + dy*dy > r*r) continue;
 const tx = px + dx, ty = py + dy;
 if (tx < 0 || tx >= canvas.width || ty < 0 || ty >= canvas.height) continue;
 const idx = (ty * canvas.width + tx) * 4;
 if (data[idx] === parseInt(bgColor.slice(1,3),16) &&
 data[idx+1] === parseInt(bgColor.slice(3,5),16) &&
 data[idx+2] === parseInt(bgColor.slice(5,7),16)) {
 data[idx] = growR;
 data[idx+1] = growG;
 data[idx+2] = growB;
 data[idx+3] = 255;
 }
 }
 }
 }
 }
 ctx.putImageData(imageData, 0, 0);
 }

 function getTrailStrength(x, y) {
 x = (x % canvas.width + canvas.width) % canvas.width;
 y = (y % canvas.height + canvas.height) % canvas.height;
 x = Math.floor(x); y = Math.floor(y);
 const idx = (y * canvas.width + x) * 4;
 return (data[idx] + data[idx+1] + data[idx+2]) / 3;
 }

 function draw() {
 if (simulating) doGrowth();
 requestAnimationFrame(draw);
 }

 // Slider listeners
 document.getElementById('agentsSlider').addEventListener('input', e => {
 numAgents = +e.target.value;
 document.getElementById('agentsVal').textContent = e.target.value;
 });
 document.getElementById('thicknessSlider').addEventListener('input', e => {
 depositRadius = +e.target.value;
 document.getElementById('thicknessVal').textContent = e.target.value;
 });
 document.getElementById('sensorDist').addEventListener('input', e => {
 sensorDist = +e.target.value;
 document.getElementById('sensorDistVal').textContent = e.target.value;
 });
 document.getElementById('turnStrength').addEventListener('input', e => {
 turnStrength = +e.target.value;
 document.getElementById('turnStrengthVal').textContent = e.target.value;
 });
 document.getElementById('growthSpeed').addEventListener('input', e => {
 stepsPerFrame = +e.target.value;
 document.getElementById('growthSpeedVal').textContent = e.target.value;
 });
 document.getElementById('fillBoost').addEventListener('input', e => {
 fillBoost = +e.target.value;
 document.getElementById('fillBoostVal').textContent = e.target.value;
 });
 document.getElementById('clusterSize').addEventListener('input', e => {
 clusterSize = +e.target.value;
 document.getElementById('clusterSizeVal').textContent = e.target.value;
 });

 document.getElementById('resize').onclick = () => {
 canvas.width = +document.getElementById('w').value;
 canvas.height = +document.getElementById('h').value;
 resetCanvas();
 };

 playBtn.onclick = () => initSimulation();
 pauseBtn.onclick = () => { simulating = false; updatePlayPauseUI(); };
 resetBtn.onclick = resetCanvas;

 document.getElementById('invert').onclick = () => {
 if (!imageData) return;
 const temp = bgColor;
 bgColor = growthColor;
 growthColor = temp;
 document.getElementById('bgColor').value = bgColor;
 document.getElementById('growthColor').value = growthColor;
 if (simulating) initSimulation();
 };

 let mediaRecorder, chunks = [];
 function toggleRecording() {
 if (recordBtn.classList.contains('recording')) {
 mediaRecorder?.stop();
 } else {
 chunks = [];
 const stream = canvas.captureStream(30);
 mediaRecorder = new MediaRecorder(stream, { mimeType: 'video/webm; codecs=vp9' });
 mediaRecorder.ondataavailable = e => chunks.push(e.data);
 mediaRecorder.onstop = () => {
 const blob = new Blob(chunks, { type: 'video/webm' });
 const url = URL.createObjectURL(blob);
 const a = document.createElement('a');
 a.href = url;
 a.download = `slime-mold-${canvas.width}x${canvas.height}.webm`;
 a.click();
 URL.revokeObjectURL(url);
 recordBtn.classList.remove('recording');
 recordBtn.textContent = '⏺ Record';
 };
 mediaRecorder.start(1000);
 recordBtn.classList.add('recording');
 recordBtn.textContent = '■ Stop';
 }
 }
 recordBtn.onclick = toggleRecording;

 // Keyboard hotkeys
 document.addEventListener('keydown', e => {
 // Ignore if typing in any input field
 if (e.target.tagName === 'INPUT') return;

 if (e.code === 'Space') {
 e.preventDefault();
 if (!simulating) {
 initSimulation();
 } else {
 simulating = false;
 updatePlayPauseUI();
 }
 }

 if (e.code === 'Backspace') {
 e.preventDefault();
 resetCanvas();
 }

 if (e.code === 'KeyR' && !e.ctrlKey && !e.metaKey) {
 e.preventDefault();
 toggleRecording();
 }
 });

 updatePlayPauseUI();
 resetCanvas();
 draw();
 </script>
</body>
</html>
